
<style>
  :root { --reel-h: 80px; }
  #machine { max-width: 420px; margin: 0 auto; padding: 1.5rem 0; }
  #screen { background: var(--color-background-secondary); border: 0.5px solid var(--color-border-tertiary); border-radius: var(--border-radius-lg); padding: 1.5rem; margin-bottom: 1rem; }
  #title { font-size: 22px; font-weight: 500; text-align: center; margin: 0 0 4px; color: var(--color-text-primary); }
  #subtitle { font-size: 13px; color: var(--color-text-secondary); text-align: center; margin: 0 0 1.25rem; }
  #reels { display: flex; gap: 10px; justify-content: center; margin-bottom: 1.25rem; }
  .reel-wrap { width: 100px; height: var(--reel-h); background: var(--color-background-primary); border: 0.5px solid var(--color-border-secondary); border-radius: var(--border-radius-md); overflow: hidden; position: relative; }
  .reel-inner { position: absolute; top: 0; left: 0; width: 100%; transition: top 0.05s linear; }
  .reel-cell { height: var(--reel-h); display: flex; flex-direction: column; align-items: center; justify-content: center; font-size: 30px; line-height: 1; }
  .reel-cell span.lbl { font-size: 10px; color: var(--color-text-secondary); margin-top: 3px; letter-spacing: 0.02em; }
  #stats { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 1.25rem; }
  .stat { background: var(--color-background-primary); border: 0.5px solid var(--color-border-tertiary); border-radius: var(--border-radius-md); padding: 10px 14px; }
  .stat-label { font-size: 12px; color: var(--color-text-secondary); margin: 0 0 2px; }
  .stat-val { font-size: 22px; font-weight: 500; color: var(--color-text-primary); margin: 0; }
  #msg { min-height: 38px; font-size: 13px; color: var(--color-text-secondary); text-align: center; margin-bottom: 1rem; line-height: 1.5; padding: 0 8px; }
  #msg.win { color: #1D9E75; font-weight: 500; }
  #msg.lose { color: #D85A30; }
  #msg.jackpot { color: #7F77DD; font-weight: 500; font-size: 15px; }
  #spin-btn { width: 100%; padding: 12px; font-size: 15px; font-weight: 500; cursor: pointer; border: 0.5px solid var(--color-border-secondary); border-radius: var(--border-radius-md); background: var(--color-background-primary); color: var(--color-text-primary); transition: background 0.15s, transform 0.1s; }
  #spin-btn:hover { background: var(--color-background-secondary); }
  #spin-btn:active { transform: scale(0.98); }
  #spin-btn:disabled { opacity: 0.45; cursor: default; transform: none; }
  #log-wrap { margin-top: 1.25rem; }
  #log-title { font-size: 13px; color: var(--color-text-secondary); margin: 0 0 6px; }
  #log { list-style: none; margin: 0; padding: 0; display: flex; flex-direction: column; gap: 4px; max-height: 120px; overflow-y: auto; }
  #log li { font-size: 12px; color: var(--color-text-secondary); border-left: 2px solid var(--color-border-tertiary); padding-left: 8px; }
  #log li.w { border-color: #1D9E75; color: var(--color-text-primary); }
  #log li.j { border-color: #7F77DD; color: var(--color-text-primary); }
  #bet-row { display: flex; align-items: center; gap: 10px; margin-bottom: 1rem; }
  #bet-row label { font-size: 13px; color: var(--color-text-secondary); white-space: nowrap; }
  #bet-row input[type=range] { flex: 1; }
  #bet-disp { font-size: 13px; font-weight: 500; min-width: 68px; text-align: right; color: var(--color-text-primary); }
</style>
<h2 class="sr-only" style="position:absolute;left:-9999px">AI Token Slot Machine — spend tokens, maybe win tokens</h2>
<div id="machine">
  <div id="screen">
    <p id="title">Token Casino</p>
    <p id="subtitle">where AI dreams meet GPU reality</p>
    <div id="reels">
      <div class="reel-wrap"><div class="reel-inner" id="r0"></div></div>
      <div class="reel-wrap"><div class="reel-inner" id="r1"></div></div>
      <div class="reel-wrap"><div class="reel-inner" id="r2"></div></div>
    </div>
    <div id="stats">
      <div class="stat"><p class="stat-label">Token balance</p><p class="stat-val" id="balance">100</p></div>
      <div class="stat"><p class="stat-label">Tokens burned</p><p class="stat-val" id="burned">0</p></div>
    </div>
    <div id="bet-row">
      <label>Bet (tokens)</label>
      <input type="range" id="bet-range" min="1" max="20" value="5" step="1">
      <span id="bet-disp">5 tokens</span>
    </div>
    <div id="msg">Insert tokens to begin hallucinating</div>
    <button id="spin-btn">Spin (costs 5 tokens)</button>
  </div>
  <div id="log-wrap">
    <p id="log-title">Recent sessions</p>
    <ul id="log"></ul>
  </div>
</div>
<script>
const SYMBOLS = [
  { icon: "🤖", label: "chatbot", weight: 10 },
  { icon: "📝", label: "prompt", weight: 10 },
  { icon: "🧠", label: "weights", weight: 9 },
  { icon: "💾", label: "context", weight: 8 },
  { icon: "🔮", label: "halluc.", weight: 7 },
  { icon: "📊", label: "dataset", weight: 7 },
  { icon: "⚡", label: "GPU", weight: 6 },
  { icon: "🌡️", label: "temp=2", weight: 5 },
  { icon: "👁️", label: "AGI?", weight: 3 },
  { icon: "🎰", label: "jackpot", weight: 1 },
];

const MESSAGES = {
  jackpot: [
    "ALIGNMENT ACHIEVED! The model finally did what you asked!",
    "AGI confirmed! (results may vary, not liable for robot uprising)",
    "Model collapsed to all tokens = jackpot. Impressive bug.",
  ],
  win3: [
    "Triple match! The model reproduced its training data. Legally concerning.",
    "Three of a kind! Your prompt was specific enough. Miracle.",
    "Winner! Tokens materialised from the latent space.",
  ],
  win2: [
    "Two matching! Like a 95% confidence interval — close enough.",
    "Partial match. We'll count it, unlike RLHF.",
    "Two out of three. The third one hallucinated.",
  ],
  lose: [
    "No match. Model was creative. Too creative.",
    "Loss detected. Gradient descent has left the chat.",
    "The AI confidently predicted a win. It was wrong.",
    "Entropy increased. Tokens burned for warmth.",
    "Output: 'As an AI language model, I cannot return tokens.'",
    "Error 404: reward not found.",
    "The model said it won, but it always says that.",
  ],
};

const PAYOUTS = { jackpot: 50, win3: 8, win2: 2 };

let balance = 100;
let burned = 0;
let spinning = false;
let bet = 5;

const pick = () => {
  const total = SYMBOLS.reduce((s, sym) => s + sym.weight, 0);
  let r = Math.random() * total;
  for (const sym of SYMBOLS) { r -= sym.weight; if (r <= 0) return sym; }
  return SYMBOLS[0];
};

const rnd = (arr) => arr[Math.floor(Math.random() * arr.length)];

const buildReel = (id, finalSym) => {
  const el = document.getElementById(id);
  const cells = [];
  for (let i = 0; i < 18; i++) cells.push(SYMBOLS[Math.floor(Math.random() * SYMBOLS.length)]);
  cells.push(finalSym);
  el.innerHTML = cells.map(s =>
    `<div class="reel-cell">${s.icon}<span class="lbl">${s.label}</span></div>`
  ).join('');
  el.style.top = '0px';
  return cells.length;
};

const spinReel = (id, totalCells, delay) => new Promise(resolve => {
  const el = document.getElementById(id);
  const cellH = 80;
  const target = -(totalCells - 1) * cellH;
  const start = performance.now() + delay;
  const duration = 1200 + delay;
  let startPos = 0;

  const tick = (now) => {
    if (now < start) { requestAnimationFrame(tick); return; }
    const elapsed = now - start;
    const progress = Math.min(elapsed / duration, 1);
    const ease = progress < 0.7 ? progress / 0.7 : 1 - ((progress - 0.7) / 0.3) * ((progress - 0.7) / 0.3) * 0.5;
    const scrolled = target * ease;
    el.style.top = scrolled + 'px';
    if (progress < 1) requestAnimationFrame(tick);
    else { el.style.top = target + 'px'; resolve(); }
  };
  requestAnimationFrame(tick);
});

const flash = (msg, cls) => {
  const el = document.getElementById('msg');
  el.textContent = msg;
  el.className = cls || '';
};

const updateStats = () => {
  document.getElementById('balance').textContent = balance;
  document.getElementById('burned').textContent = burned;
};

const addLog = (text, cls) => {
  const li = document.createElement('li');
  li.textContent = text;
  if (cls) li.className = cls;
  const log = document.getElementById('log');
  log.prepend(li);
  while (log.children.length > 8) log.removeChild(log.lastChild);
};

document.getElementById('bet-range').addEventListener('input', function() {
  bet = parseInt(this.value);
  document.getElementById('bet-disp').textContent = `${bet} tokens`;
  document.getElementById('spin-btn').textContent = `Spin (costs ${bet} tokens)`;
});

document.getElementById('spin-btn').addEventListener('click', async () => {
  if (spinning) return;
  if (balance < bet) { flash("Insufficient tokens. Have you tried prompting for more?", "lose"); return; }
  spinning = true;
  document.getElementById('spin-btn').disabled = true;
  flash("Tokenizing your hopes...", "");

  balance -= bet;
  burned += bet;
  updateStats();

  const results = [pick(), pick(), pick()];
  const counts = [0, 1, 2].map(i => buildReel('r' + i, results[i]));

  await Promise.all([0, 1, 2].map(i => spinReel('r' + i, counts[i], i * 220)));

  const icons = results.map(r => r.icon);
  const isJackpot = icons[0] === '🎰' && icons[1] === '🎰' && icons[2] === '🎰';
  const allSame = icons[0] === icons[1] && icons[1] === icons[2];
  const twoSame = icons[0] === icons[1] || icons[1] === icons[2] || icons[0] === icons[2];

  let payout = 0, outcome = 'lose', logCls = '';
  if (isJackpot) { payout = bet * PAYOUTS.jackpot; outcome = 'jackpot'; logCls = 'j'; }
  else if (allSame) { payout = bet * PAYOUTS.win3; outcome = 'win3'; logCls = 'w'; }
  else if (twoSame) { payout = bet * PAYOUTS.win2; outcome = 'win2'; logCls = 'w'; }

  if (payout) { balance += payout; }
  updateStats();

  const cls = outcome === 'jackpot' ? 'jackpot' : (payout ? 'win' : 'lose');
  const suffix = payout ? ` +${payout} tokens!` : ` -${bet} tokens.`;
  flash(rnd(MESSAGES[outcome]) + suffix, cls);

  const logText = `${icons.join(' ')} — ${payout ? '+'+payout : '-'+bet} tokens`;
  addLog(logText, logCls);

  if (balance <= 0) {
    balance = 0;
    updateStats();
    setTimeout(() => flash("Balance depleted. The model regrets nothing.", "lose"), 500);
  }

  spinning = false;
  document.getElementById('spin-btn').disabled = false;
  document.getElementById('spin-btn').textContent = `Spin (costs ${bet} tokens)`;
});

updateStats();
</script>
